<style>
  :root{
    --bg:#0B0E14;
    --bg-soft:#11151F;
    --panel:#161B26;
    --panel-hover:#1C2230;
    --line:#252B3A;
    --accent:#6EE7B7;
    --accent-2:#7C9BFF;
    --text:#F2F4F8;
    --text-dim:#8B93A7;
    --danger:#F0667D;

    --radius-lg:18px;
    --radius-md:12px;
    --transition:160ms cubic-bezier(.2,.7,.2,1);
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% -10%, rgba(124,155,255,0.12), transparent 45%),
      radial-gradient(circle at 90% 0%, rgba(110,231,183,0.08), transparent 40%),
      var(--bg);
    background-attachment: fixed;
    background-repeat: no-repeat;
    color:var(--text);
    font-family:'Inter', system-ui, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  header{
    padding:48px 24px 20px;
    text-align:center;
  }

  .logo-mark{
    width:44px;height:44px;margin:0 auto 14px;
    border-radius:12px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow:0 8px 24px rgba(124,155,255,0.25);
  }

  h1{
    font-family:'Sora', sans-serif;
    font-weight:700;
    letter-spacing:-0.01em;
    font-size:clamp(1.7rem, 4vw, 2.5rem);
    margin:0;
    color:var(--text);
  }

  .subtitle{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-top:8px;
  }

  nav.tabs{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:32px auto 0;
    padding:6px;
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:999px;
    width:fit-content;
  }

  .tab-btn{
    background:none;
    border:none;
    color:var(--text-dim);
    font-family:'Inter', sans-serif;
    font-size:0.88rem;
    font-weight:600;
    letter-spacing:0.01em;
    cursor:pointer;
    padding:9px 20px;
    border-radius:999px;
    transition:color var(--transition), background var(--transition);
  }

  .tab-btn:hover{ color:var(--text); }

  .tab-btn.active{
    color:#0B0E14;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
  }

  .tab-btn:focus-visible, .tile:focus-visible, .icon-btn:focus-visible{
    outline:2px solid var(--accent-2);
    outline-offset:3px;
  }

  main{
    flex:1;
    width:100%;
    max-width:1100px;
    margin:0 auto;
    padding:40px 24px 60px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    gap:18px;
  }

  .tile{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    cursor:pointer;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    color:var(--text);
    font-family:'Inter', sans-serif;
    padding:0;
    text-align:left;
    transition:transform var(--transition), border-color var(--transition), box-shadow var(--transition), background var(--transition);
  }

  .tile:hover, .tile:focus-visible{
    transform:translateY(-4px);
    border-color:var(--accent-2);
    background:var(--panel-hover);
    box-shadow:0 14px 30px rgba(0,0,0,0.4);
  }

  .tile-img-wrap{
    width:100%;
    aspect-ratio:4/3;
    background:#0D1018;
    overflow:hidden;
  }

  .tile-img-wrap img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
    transition:transform 280ms ease;
  }

  .tile:hover .tile-img-wrap img{
    transform:scale(1.05);
  }

  .tile-title{
    padding:12px 14px 16px;
    font-size:0.92rem;
    font-weight:600;
    line-height:1.3;
  }

  /* Controls row: centered search bar */
  .controls{
    display:flex;
    flex-direction:column;
    align-items: center;
    gap:14px;
    margin-bottom:32px;
  }

  .search-wrap{
    position:relative;
    width: 100%;
    max-width:520px;
  }

  .search-wrap svg{
    position:absolute;
    left:14px;top:50%;
    transform:translateY(-50%);
    width:16px;height:16px;
    color:var(--text-dim);
    pointer-events:none;
  }

  #searchInput{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.9rem;
    padding:11px 14px 11px 38px;
    border-radius:999px;
    outline:none;
    transition:border-color var(--transition), box-shadow var(--transition);
  }

  #searchInput::placeholder{ color:var(--text-dim); }
  #searchInput:focus{ 
    border-color:var(--accent-2); 
    box-shadow: 0 0 15px rgba(124,155,255,0.15);
  }

  /* Pinned Right-Side Vertical Scrubber */
  .jump-bar{
    position: fixed;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display:flex;
    flex-direction: column;
    gap: 2px;
    background: rgba(17, 21, 31, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    padding: 10px 6px;
    border-radius: 16px;
    z-index: 40;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    max-height: 85vh;
    overflow-y: auto;
  }

  .jump-btn{
    background: transparent;
    border: none;
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem;
    font-weight:600;
    width: 26px;
    height: 22px;
    border-radius: 6px;
    cursor:pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
  }

  .jump-btn:hover:not(:disabled){
    background: var(--accent);
    color: #0B0E14;
    transform: scale(1.2);
  }

  .jump-btn:disabled{
    opacity:0.15;
    cursor:not-allowed;
  }

  /* Text-list style for Arcade tab */
  .list{
    display:flex;
    flex-direction:column;
    grid-column: 1 / -1; /* Breaks out of the grid column trap */
    width: 100%;
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    overflow:hidden;
  }

  .list-row{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:none;
    border-bottom:1px solid var(--line);
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.95rem;
    font-weight:500;
    text-align:left;
    width:100%;
    padding:14px 60px 14px 18px; /* Extra right padding protects text from the jump bar */
    cursor:pointer;
    transition:background var(--transition), padding-left var(--transition);
  }

  .list-row:last-child{ border-bottom:none; }

  .list-row:hover, .list-row:focus-visible{
    background:var(--panel-hover);
    padding-left:24px;
  }

  .list-row-letter{
    font-family:'JetBrains Mono', monospace;
    font-size:0.78rem;
    color:var(--accent);
    width:18px;
    flex-shrink:0;
  }

  .empty-state{
    text-align:center;
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    padding:60px 20px;
    border:1px dashed var(--line);
    border-radius:var(--radius-lg);
    line-height:1.7;
  }

  /* Portal viewer */
  .portal-overlay{
    position:fixed;
    inset:0;
    z-index:50;
    display:none;
    opacity:0;
    background:rgba(6,8,14,0.94);
    backdrop-filter:blur(6px);
    transition:opacity 220ms ease;
  }

  .portal-overlay.open{
    display:flex;
    opacity:1;
  }

  .portal-panel{
    margin:auto;
    width:min(1200px, 94vw);
    height:min(800px, 88vh);
    background:#000;
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transform:scale(0.97);
    transition:transform 220ms cubic-bezier(.2,.7,.2,1);
  }

  .portal-overlay.open .portal-panel{
    transform:scale(1);
  }

  .portal-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }

  .portal-title{
    font-family:'Sora', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    color:var(--text);
  }

  .icon-btn{
    background:var(--bg-soft);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
    padding:7px 14px;
    font-family:'Inter', sans-serif;
    font-size:0.85rem;
    font-weight:500;
    cursor:pointer;
    transition:border-color var(--transition), color var(--transition);
  }

.portal-actions { display: flex; gap: 8px; }

.action-btn:hover { border-color: var(--accent-2); color: var(--accent-2); }
.danger-btn:hover { border-color: var(--danger); color: var(--danger); }

  iframe.portal-frame{
    width:100%;
    height:100%;
    border:none;
    background:#000;
    flex:1;
  }

  footer{
    text-align:center;
    padding:20px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.06em;
    color:var(--text-dim);
  }

  /* Responsive squeeze for short laptop screens */
  @media (max-height: 700px) {
    .jump-bar { gap: 0; padding: 6px 4px; }
    .jump-btn { height: 18px; font-size: 0.65rem; }
  }
</style>
</head>

  const grid = document.getElementById('grid');
  const tabsNav = document.getElementById('tabs');
  const overlay = document.getElementById('portalOverlay');
  const frame = document.getElementById('portalFrame');
  const portalTitle = document.getElementById('portalTitle');
  const fullscreenBtn = document.getElementById('fullscreenPortal');
  const closeBtn = document.getElementById('closePortal');
  const searchInput = document.getElementById('searchInput');
  const jumpBar = document.getElementById('jumpBar');

  let currentTab = 'arcade';
  let searchTerm = '';

  const JUMP_KEYS = '#0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  function groupKey(title){
    const ch = (title || '').trim().charAt(0).toUpperCase();
    if(/[0-9]/.test(ch)) return '0';
    if(/[A-Z]/.test(ch)) return ch;
    return '#';
  }

  function getFilteredList(tab){
    const list = (GAMES[tab] || []).slice().sort((a,b) => a.title.localeCompare(b.title));
    if(!searchTerm) return list;
    return list.filter(g => g.title.toLowerCase().includes(searchTerm.toLowerCase()));
  }

  function renderJumpBar(tab){
    jumpBar.innerHTML = '';
    if(tab !== 'arcade'){ jumpBar.style.display = 'none'; return; }
    jumpBar.style.display = 'flex';

    const list = getFilteredList(tab);
    const presentKeys = new Set(list.map(g => groupKey(g.title)));

    JUMP_KEYS.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'jump-btn';
      btn.type = 'button';
      btn.textContent = key === '0' ? '0-9' : key;
      const has = presentKeys.has(key);
      btn.disabled = !has;
      if(has){
        btn.addEventListener('click', () => {
          const target = document.querySelector(`.list-row[data-group="${key}"]`);
          if(target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      }
      jumpBar.appendChild(btn);
    });
  }

  function renderTiles(tab){
    const list = getFilteredList(tab);
    grid.innerHTML = '';

    if(list.length === 0){
      const msg = searchTerm
        ? `No matches for "${searchTerm}".`
        : `No entries in this tab yet.<br>Add some to GAMES.${tab} in the script,<br>or run the scan_repo.py helper to pull links from a GitHub repo.`;
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">${msg}</div>`;
      return;
    }

    if(tab === 'arcade'){
      const wrap = document.createElement('div');
      wrap.className = 'list';
      let lastGroup = null;
      list.forEach(game => {
        const g = groupKey(game.title);
        const row = document.createElement('button');
        row.className = 'list-row';
        row.dataset.group = (g !== lastGroup) ? g : '';
        if(g !== lastGroup) lastGroup = g;
        row.innerHTML = `<span class="list-row-letter">${g === '0' ? '#' : g}</span><span>${game.title}</span>`;
        row.addEventListener('click', () => openPortal(game));
        wrap.appendChild(row);
      });
      grid.appendChild(wrap);
      return;
    }

    list.forEach(game => {
      const btn = document.createElement('button');
      btn.className = 'tile';
      btn.innerHTML = `
        <span class="tile-img-wrap"><img src="${game.image}" alt="" loading="lazy"></span>
        <span class="tile-title">${game.title}</span>
      `;
      btn.addEventListener('click', () => openPortal(game));
      grid.appendChild(btn);
    });
  }

  function renderAll(){
    renderJumpBar(currentTab);
    renderTiles(currentTab);
  }

  tabsNav.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tabsNav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderAll();
    });
  });

  searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderAll();
  });

  function openPortal(game){
    portalTitle.textContent = game.title;
    frame.src = game.url;
    overlay.classList.add('open');

    // FORCE the browser's cursor/keyboard focus inside the frame 250ms after it mounts
    setTimeout(() => {
      frame.focus();
    }, 250);
  }

  function closePortal(){
    overlay.classList.remove('open');
    setTimeout(() => { frame.src = 'about:blank'; }, 220);
  }

  closeBtn.addEventListener('click', closePortal);
  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) closePortal();
  });

  fullscreenBtn.addEventListener('click', () => {
    if (frame.requestFullscreen) {
      frame.requestFullscreen();
    } else if (frame.webkitRequestFullscreen) { // Safari catch
      frame.webkitRequestFullscreen();
    }
  });

  document.addEventListener('keydown', (e) => {
    // Added 'e.shiftKey' so normal in-game Escape presses are ignored by the launcher
    if(e.key === 'Escape' && e.shiftKey && overlay.classList.contains('open')) {
      if (!document.fullscreenElement) closePortal();
    }
  });

  window.addEventListener('load', () => {
    renderAll();
  });
</script>
